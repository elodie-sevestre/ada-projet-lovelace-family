services:
  # Frontend - Vite React
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: lovelace-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    command: npm run dev
    depends_on:
      - backend

  # Backend - Express Node.js
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: lovelace-backend
    ports:
      - "5000:5000"
    volumes:
      - ./back:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5433
      - DB_USER=lovelace_user
      - DB_PASSWORD=lovelace_password
      - DB_NAME=lovelace_db
    depends_on:
      - postgres
    command: npm run dev

  # Database - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: lovelace-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=lovelace_user
      - POSTGRES_PASSWORD=lovelace_password
      - POSTGRES_DB=lovelace_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovelace_user -d lovelace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: lovelace-network
