services:
  # Frontend - Vite React
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: lovelace-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    command: npm run dev -- --host
    depends_on:
      - backend

  # Backend - Express Node.js
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: lovelace-backend
    ports:
      - "5000:5000"
      - "9229:9229"
    volumes:
      - ./back:/app
      - /app/node_modules
    env_file:
      - ./back/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  # Database - PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: lovelace-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=lovelace_user
      - POSTGRES_PASSWORD=lovelace_password
      - POSTGRES_DB=lovelace_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovelace_user -d lovelace_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:

networks:
  default:
    name: lovelace-network
